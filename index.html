<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 2 — Our Story</title>
    <style>
        /* Modern Design Token Systems */
        :root {
            --bg-space: #050510;
            --bg-storm: #0b0b16;
            --bg-dawn: #1c1428;
            --text-main: #f8fafc;
            --accent-pink: #ff758f;
            --accent-rose: #ff4d6d;
            --accent-gold: #ffb703;
            --glass-blend: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-space);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Live Cinema Stage Engine */
        .cinema-stage {
            position: relative;
            width: 100%;
            height: 100%;
            background: var(--bg-space);
            transition: background 2.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Immersive Environmental Layers */
        .env-layer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            z-index: 2;
        }

        .starfield {
            background: radial-gradient(white, rgba(255,255,255,0.15) 1px, transparent 35px);
            background-size: 50px 50px;
        }

        .weather-rain {
            background: linear-gradient(transparent, rgba(255, 255, 255, 0.08));
            background-size: 4px 200px;
            animation: weatherFall 0.4s linear infinite;
        }

        .moon-luminary {
            position: absolute;
            top: 12%;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            width: 110px;
            height: 110px;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.6);
            transition: transform 3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 3s ease;
        }

        /* Glassmorphism User Interface Containers */
        .dialogue-center {
            position: relative;
            background: var(--glass-blend);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 50px 40px;
            border-radius: 28px;
            text-align: center;
            max-width: 520px;
            width: 90%;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.7);
            z-index: 20;
            opacity: 1;
            transform: scale(1);
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .dialogue-center.fade-out-hidden {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
        }

        .interactive-text {
            font-size: 1.45rem;
            line-height: 1.8;
            font-weight: 400;
            letter-spacing: -0.01em;
            min-height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.4s ease;
        }

        /* Dynamic Visual Markers */
        .rotating-name-marker {
            color: var(--accent-pink);
            font-weight: 600;
            display: inline-block;
            text-shadow: 0 0 15px rgba(255, 117, 143, 0.3);
            animation: markerPopIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Interactive Choices Layout Config */
        .action-tray {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 35px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(15px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .action-tray.display-ready {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .interactive-trigger {
            padding: 14px 32px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
        }

        .trigger-confirm {
            background: linear-gradient(135deg, var(--accent-rose), var(--accent-pink));
            color: white;
            box-shadow: 0 6px 20px rgba(255, 77, 109, 0.35);
        }

        .trigger-fallback {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .interactive-trigger:hover {
            transform: translateY(-3px);
        }
        
        .trigger-confirm:hover {
            box-shadow: 0 10px 25px rgba(255, 77, 109, 0.5);
        }

        /* Movie Ending Characters & Floor Architecture */
        .stage-floor {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 25vh;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 22%;
            opacity: 0;
            transition: opacity 2.5s ease-in-out;
            z-index: 5;
        }

        .actor-silhouette {
            width: 32px;
            height: 100px;
            background: #020206;
            border-radius: 16px 16px 0 0;
            position: relative;
            transition: transform 6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .actor-boy { transform: translateX(-180px); }
        .actor-girl { transform: translateX(180px); }

        .actor-limb {
            position: absolute;
            width: 14px;
            height: 45px;
            background: #020206;
            top: 28px;
            border-radius: 8px;
            transition: transform 2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .actor-boy .actor-limb { right: -4px; transform-origin: top center; }
        .actor-girl .actor-limb { left: -4px; transform-origin: top center; }

        /* Realtime Floating Particle System Engine */
        .live-particle {
            position: absolute;
            pointer-events: none;
            user-select: none;
            z-index: 3;
            animation: particleAscent 4.5s linear forwards;
        }

        /* Animation Keyframe Registries */
        @keyframes weatherFall {
            0% { background-position: 0px 0px; }
            100% { background-position: 30px 600px; }
        }

        @keyframes particleAscent {
            0% { transform: translateY(105vh) scale(0.5); opacity: 0; }
            15% { opacity: 0.8; }
            85% { opacity: 0.8; }
            100% { transform: translateY(-15vh) scale(1.1) rotate(180deg); opacity: 0; }
        }

        @keyframes markerPopIn {
            0% { transform: scale(0.75); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .cinematic-pulse { animation: systemicHeartbeat 1.4s infinite; }
        @keyframes systemicHeartbeat {
            0%, 100% { background-color: var(--bg-space); }
            50% { background-color: #1a040b; }
        }
    </style>
</head>
<body>

    <div class="cinema-stage" id="viewportStage">
        <div class="env-layer starfield" id="envStars"></div>
        <div class="env-layer" id="envMoon"><div class="moon-luminary" id="moonNode"></div></div>
        <div class="env-layer weather-rain" id="envRain"></div>
        <div id="runtimeParticleSpace" style="position:absolute; inset:0; width:100%; height:100%; overflow:hidden; pointer-events:none; z-index:3;"></div>

        <div class="dialogue-center" id="interfaceCard">
            <div class="interactive-text" id="viewTextTarget">Typing...</div>
            <div class="action-tray" id="interfaceButtons">
                <button class="interactive-trigger trigger-confirm" onclick="triggerSelection('yes')">❤️ YES</button>
                <button class="interactive-trigger trigger-fallback" onclick="triggerSelection('try')">💖 Let's Try Again</button>
            </div>
        </div>

        <div class="stage-floor" id="floorLayer">
            <div class="actor-silhouette actor-boy" id="boyNode"><div class="actor-limb"></div></div>
            <div class="actor-silhouette actor-girl" id="girlNode"><div class="actor-limb"></div></div>
        </div>
    </div>

    <script>
        const affectionateNames = ["Suchi Ma ❤️", "Thango 💖", "Ammu 🌸", "Chello 💕", "Tiger Kutty 🐯❤️", "Thanga Pulla 💕"];
        let identifierIndex = 0;

        function renderDynamicToken() {
            const currentToken = affectionateNames[identifierIndex];
            identifierIndex = (identifierIndex + 1) % affectionateNames.length;
            return `<span class="rotating-name-marker">${currentToken}</span>`;
        }

        const viewTextTarget = document.getElementById('viewTextTarget');
        const viewportStage = document.getElementById('viewportStage');
        const interfaceCard = document.getElementById('interfaceCard');
        const interfaceButtons = document.getElementById('interfaceButtons');

        // Linear Timeline Manager Implementation
        async function beginCinematicTimeline() {
            // Scene 1 Setup: Introduction Atmosphere
            document.getElementById('envStars').style.opacity = '0.45';
            document.getElementById('envMoon').style.opacity = '0.75';
            allocateActiveEmittingParticles('✨', 16);

            await updateDisplayContent("Hi Suchi Ma..."); await waitPeriod(2500);
            await updateDisplayContent("Before you read anything..."); await waitPeriod(2500);
            await updateDisplayContent("Close your eyes for just one second..."); await waitPeriod(3000);

            // Audio-Visual System Heartbeat Simulation Phase
            viewportStage.classList.add('cinematic-pulse');
            interfaceCard.style.opacity = '0';
            await waitPeriod(3500);
            viewportStage.classList.remove('cinematic-pulse');
            interfaceCard.style.opacity = '1';

            await updateDisplayContent("Thank you..."); await waitPeriod(2000);
            await updateDisplayContent("Thank you for giving me one last chance."); await waitPeriod(3500);

            // Scene 2 Setup: Interrupted Harmony Atmosphere
            document.getElementById('envRain').style.opacity = '0.55';
            viewportStage.style.background = var(--bg-storm);
            await updateDisplayContent("I know... 💔"); await waitPeriod(2000);
            await updateDisplayContent("I hurt you."); await waitPeriod(2000);
            await updateDisplayContent("I made you feel unloved."); await waitPeriod(2500);
            await updateDisplayContent("That is something I can never be proud of."); await waitPeriod(3800);

            // Scene 3 Setup: Dynamic Recovery Action
            document.getElementById('envRain').style.opacity = '0';
            viewportStage.style.background = var(--bg-dawn);
            allocateActiveEmittingParticles('🌸', 15);
            await updateDisplayContent(`But ${renderDynamicToken()}...`); await waitPeriod(2500);
            await updateDisplayContent("Every mistake taught me how precious you really are."); await waitPeriod(3800);

            // Scene 4 Setup: Promise Declarations Execution loop
            const structuredPromises = [
                "✨ I promise to protect your smile.",
                "✨ I promise to understand before reacting.",
                "✨ I promise to never let your tears fall because of me again.",
                "✨ I promise to become your peace.",
                "✨ I promise to become your safest place.",
                "✨ I promise to keep choosing you every single day."
            ];
            for (let localizedStatement of structuredPromises) {
                await updateDisplayContent(localizedStatement);
                await waitPeriod(3200);
            }

            // Movie Ending Context Presentation Configuration
            interfaceCard.classList.add('fade-out-hidden');
            document.getElementById('floorLayer').style.opacity = '1';
            await waitPeriod(1200);

            // Character Traversal Interpolation
            document.getElementById('boyNode').style.transform = 'translateX(110px)';
            document.getElementById('girlNode').style.transform = 'translateX(-110px)';
            await waitPeriod(5500);

            // Interactive Engagement Logic (Hand Connection Animation Setup)
            document.getElementById('boyNode').querySelector('.actor-limb').style.transform = 'rotate(-35deg) translateX(6px)';
            document.getElementById('girlNode').querySelector('.actor-limb').style.transform = 'rotate(30deg) translateX(-6px)';
            document.getElementById('moonNode').style.boxShadow = '0 0 90px rgba(255, 255, 255, 1)';
            allocateActiveEmittingParticles('❤️', 25);
            await waitPeriod(4500);

            // Re-render UI Context Over Layout Screen Layer
            interfaceCard.classList.remove('fade-out-hidden');
            await updateDisplayContent("Every ending can become a new beginning...<br>If we choose love...<br>Together.");
            await waitPeriod(5000);

            // UI Decision Prompt Elevation
            viewTextTarget.innerHTML = `<h3>🌸</h3><h2 style='margin-top:12px;'>Shall We Start Chapter 2 Together?</h2>`;
            interfaceButtons.classList.add('display-ready');
        }

        // Action Decision Processing Function
        function triggerSelection(decisionPath) {
            interfaceButtons.classList.remove('display-ready');
            if (decisionPath === 'yes') {
                allocateActiveEmittingParticles('🦋', 45);
                allocateActiveEmittingParticles('❤️', 45);
                document.getElementById('moonNode').style.transform = 'translateX(-50%) scale(1.25)';
                viewTextTarget.innerHTML = `
                    <h2 style="color: var(--accent-pink); font-size: 2.1rem; letter-spacing:-0.02em;">I LOVE YOU SUCHI MA</h2>
                    <p style="margin-top:16px; font-size: 1.15rem;">One Kiss for Our New Beginning 💋</p>
                    <p style="opacity:0.65; font-size:0.9rem; margin-top:12px;">Love You Forever ❤️</p>
                `;
            } else {
                viewTextTarget.innerHTML = `
                    <h3>That's okay, ${renderDynamicToken()}...</h3>
                    <p style="margin-top:12px; font-size:1.1rem; opacity:0.85; line-height:1.6;">Love isn't proven in one moment... I'll keep showing you through my actions.</p>
                    <p style="color: var(--accent-pink); margin-top:18px; font-weight:600;">❤️ I'll Never Stop Choosing You.</p>
                `;
            }
        }

        // Functional Utilities Framework
        function updateDisplayContent(markupPayload) {
            return new Promise((completionCallback) => {
                viewTextTarget.style.opacity = '0';
                setTimeout(() => {
                    viewTextTarget.innerHTML = markupPayload;
                    viewTextTarget.style.opacity = '1';
                    completionCallback();
                }, 600);
            });
        }

        function allocateActiveEmittingParticles(visualGlyph, computationalQuantity) {
            const rootContainerSpace = document.getElementById('runtimeParticleSpace');
            for(let loopIndex = 0; loopIndex < computationalQuantity; loopIndex++) {
                const particleInstanceElement = document.createElement('div');
                particleInstanceElement.className = 'live-particle';
                particleInstanceElement.textContent = visualGlyph;
                particleInstanceElement.style.left = Math.random() * 100 + 'vw';
                particleInstanceElement.style.fontSize = (Math.random() * 22 + 16) + 'px';
                particleInstanceElement.style.animationDelay = (Math.random() * 2.5) + 's';
                rootContainerSpace.appendChild(particleInstanceElement);
                setTimeout(() => particleInstanceElement.remove(), 4500);
            }
        }

        function waitPeriod(delayDurationMilliseconds) { 
            return new Promise(resolveInstance => setTimeout(resolveInstance, delayDurationMilliseconds)); 
        }

        // Initializer Execution Injection Hook
        window.addEventListener('DOMContentLoaded', beginCinematicTimeline);
    </script>
</body>
</html>
